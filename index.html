<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Contracts" />
  <title>Contract Accountant PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Archivo', sans-serif; background: #f4f7f4; min-height: 100vh; }
    input, select, textarea, button { font-family: 'Archivo', sans-serif; }
    input:focus, select:focus, textarea:focus { border-color: #1a7a4a !important; background: #fff !important; outline: none; }
    button { transition: all 0.15s; cursor: pointer; }
    button:active { opacity: 0.8; transform: scale(0.98); }
    table { width: 100%; border-collapse: collapse; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #c8d8cc; border-radius: 2px; }

    /* Mobile responsive */
    @media (max-width: 600px) {
      .nav-title-sub { display: none; }
      .stats-row { flex-direction: column !important; }
      .stats-row > div { min-width: unset !important; }
      .grid-2 { grid-template-columns: 1fr !important; }
      .span-2 { grid-column: span 1 !important; }
      .hide-mobile { display: none !important; }
      .card-pad { padding: 18px 16px !important; }
      .nav-pad { padding: 0 16px !important; }
      .body-pad { padding: 20px 14px !important; }
      h1.page-title { font-size: 26px !important; }
      h2.form-title { font-size: 20px !important; }
      .contract-cards { grid-template-columns: 1fr !important; }
      .entry-date { display: none; }
    }
  </style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState } = React;

// ── Cloud Sync Config ────────────────────────────────────────────────────────
const JSONBIN_KEY = "$2a$10$v7/jaHHXOOcWJmOaJrcIHOdB7F/57hAwlvwgZ9ZQB.Hhq80tN8MDu";
const JSONBIN_URL = "https://api.jsonbin.io/v3/bins";
const LOCAL_KEY = "cap_contracts_v1";
const BIN_ID_KEY = "cap_bin_id";
const FIXED_BIN_ID = "69ab8a46ae596e708f67fd90"; // hardcoded — same bin on all devices

// ── Always use the fixed bin ID — same on every device ───────────────────────
async function getOrCreateBinId() {
  return FIXED_BIN_ID;
}

async function cloudLoad() {
  try {
    const binId = await getOrCreateBinId();
    if (!binId) return null;
    const res = await fetch(`${JSONBIN_URL}/${binId}/latest`, {
      headers: { "X-Access-Key": JSONBIN_KEY }
    });
    const d = await res.json();
    return d.record?.contracts || null;
  } catch { return null; }
}

async function cloudSave(contracts) {
  try {
    const binId = await getOrCreateBinId();
    if (!binId) return;
    await fetch(`${JSONBIN_URL}/${binId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Access-Key": JSONBIN_KEY
      },
      body: JSON.stringify({ contracts })
    });
  } catch(e) { console.error("Cloud save failed", e); }
  localStorage.setItem(LOCAL_KEY, JSON.stringify(contracts));
}

// ── Data ─────────────────────────────────────────────────────────────────────
const KEY = "cap_contracts_v1";

const DEFAULT_CONTRACTS = [
  {
    id: "khalifa-001",
    name: "Khalifa Villa",
    client: "Dr. Mahmoud Al-Kamali",
    value: 1674843.46,
    startDate: "2026-02-23",
    endDate: "",
    notes: "Al Mireef, Plot SE-45/286, Abu Dhabi. 7% retention. Payment within 30 days of consultant approval.",
    items: []
  },
  {
    id: "shamkha-001",
    name: "Shamkha Villa",
    client: "Khalfan Mohammed Saeed bin Maran Al Zaheri",
    value: 2450000,
    startDate: "2026-02-26",
    endDate: "",
    notes: "Al Shamkha, Abu Dhabi – Plot 12, #039-000-002-509. Supervised by Al Maghreb Al Arabi Consultants. 8% retention. Payment within 30 days of consultant approval.",
    items: []
  },
  {
    id: "shamkha-002",
    name: "Shamkha Villa 2",
    client: "Saeed Mohammed bin Maran Al Zaheri",
    value: 2450000,
    startDate: "2026-02-26",
    endDate: "",
    notes: "Al Shamkha, Abu Dhabi – Plot 12, #39-002-000-512. Supervised by Al Maghreb Al Arabi Consultants. 8% retention. Payment within 30 days of consultant approval.",
    items: []
  },
  {
    id: "shamkha-003",
    name: "Shamkha Villa 3",
    client: "Khalid Mohammed Saeed bin Maran Al Zaheri",
    value: 2380000,
    startDate: "2026-02-26",
    endDate: "",
    notes: "Al Shamkha, Abu Dhabi – Plot 12, #39-002-000-511. Supervised by Al Maghreb Al Arabi Consultants. 8% retention. Payment within 30 days of consultant approval.",
    items: []
  }
];

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY) || "null");
    if (!d) return DEFAULT_CONTRACTS;
    let result = [...d];
    DEFAULT_CONTRACTS.forEach(def => {
      if (!result.find(c => c.id === def.id)) result = [def, ...result];
    });
    return result;
  } catch { return DEFAULT_CONTRACTS; }
}

function saveData(data) {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch {}
  cloudSave(data); // also save to cloud
}

const TYPES = ["Revenue", "Expense", "Salary", "Other"];
const fmt = n => "AED " + Number(n || 0).toLocaleString("en-AE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

// ── Badge ─────────────────────────────────────────────────────────────────────
function Badge({ type }) {
  const map = {
    Revenue: { bg: "#e6f4ee", color: "#1a7a4a" },
    Expense: { bg: "#fdeaea", color: "#c0392b" },
    Salary:  { bg: "#fff3e0", color: "#e67e22" },
    Other:   { bg: "#eef2ff", color: "#4f46e5" },
  };
  const { bg, color } = map[type] || map.Other;
  return (
    <span style={{ background: bg, color, fontSize: 11, fontWeight: 700,
      padding: "3px 10px", borderRadius: 20, letterSpacing: "0.03em", whiteSpace: "nowrap" }}>
      {type}
    </span>
  );
}

// ── StatCard ──────────────────────────────────────────────────────────────────
function StatCard({ label, value, color, sub }) {
  return (
    <div style={{ background: "#fff", border: "1px solid #e8ede9", borderRadius: 14,
      padding: "16px 18px", flex: 1, minWidth: 130 }}>
      <div style={{ fontSize: 10, color: "#94a3b8", textTransform: "uppercase",
        letterSpacing: "0.09em", marginBottom: 6, fontWeight: 600 }}>{label}</div>
      <div style={{ fontSize: 17, fontWeight: 800, color: color || "#1a2e1a" }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 3 }}>{sub}</div>}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [contracts, setContracts] = useState(loadData);
  const [page, setPage] = useState("home");
  const [activeId, setActiveId] = useState(null);
  const [form, setForm] = useState({});
  const [aiText, setAiText] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [syncStatus, setSyncStatus] = useState("loading"); // loading | synced | saved | error

  const active = contracts.find(c => c.id === activeId);

  // Always load from cloud on every startup — ignore localStorage for initial data
  React.useEffect(() => {
    setSyncStatus("loading");
    cloudLoad().then(cloudData => {
      if (cloudData && Array.isArray(cloudData)) {
        let result = [...cloudData];
        DEFAULT_CONTRACTS.forEach(def => {
          if (!result.find(c => c.id === def.id)) result = [def, ...result];
        });
        // Always use cloud data — overwrite local
        localStorage.setItem(KEY, JSON.stringify(result));
        setContracts(result);
        setSyncStatus("synced");
      } else {
        // No cloud data yet — use local as fallback
        setSyncStatus("synced");
      }
    }).catch(() => {
      // Cloud failed — use local as fallback
      setSyncStatus("error");
    });
  }, []);

  function update(updated) {
    setContracts(updated);
    setSyncStatus("saving");
    saveData(updated);
    setTimeout(() => setSyncStatus("saved"), 1500);
  }

  function openContract(id) { setActiveId(id); setPage("detail"); setAiText(""); }

  function saveContract() {
    if (!form.name?.trim()) return;
    if (form.id) {
      update(contracts.map(c => c.id === form.id ? { ...c, ...form, value: parseFloat(form.value) || 0 } : c));
    } else {
      const c = { id: Date.now().toString(), items: [], ...form, value: parseFloat(form.value) || 0 };
      update([...contracts, c]);
      setActiveId(c.id);
    }
    setPage("detail");
    setForm({});
  }

  function saveItem() {
    if (!form.desc?.trim() || !form.amount) return;
    const item = { id: Date.now().toString(), type: form.type || "Expense",
      desc: form.desc, amount: parseFloat(form.amount), date: form.date || "", note: form.note || "" };
    update(contracts.map(c => c.id === activeId ? { ...c, items: [...c.items, item] } : c));
    setPage("detail"); setForm({});
  }

  function deleteItem(itemId) {
    update(contracts.map(c => c.id === activeId
      ? { ...c, items: c.items.filter(i => i.id !== itemId) } : c));
  }

  function deleteContract(id) {
    const updated = contracts.filter(c => c.id !== id);
    update(updated);
    setPage("home"); setActiveId(null); setDeleteConfirm(null);
  }

  function exportData() {
    const data = JSON.stringify(contracts, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "contracts-backup-" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!Array.isArray(parsed)) { alert("Invalid backup file."); return; }
        if (confirm("This will replace all current data with the backup. Continue?")) {
          update(parsed);
          alert("✅ Data restored successfully!");
        }
      } catch { alert("❌ Could not read file. Make sure it's a valid backup."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  async function generateAI() {
    if (!active) return;
    setAiLoading(true); setAiText("");
    const rev = active.items.filter(i => i.type === "Revenue").reduce((s,i) => s+i.amount, 0);
    const exp = active.items.filter(i => i.type === "Expense").reduce((s,i) => s+i.amount, 0);
    const sal = active.items.filter(i => i.type === "Salary").reduce((s,i) => s+i.amount, 0);
    const oth = active.items.filter(i => i.type === "Other").reduce((s,i) => s+i.amount, 0);
    const net = active.value + rev - exp - sal - oth;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content:
            `You are a professional accountant. Analyze this contract and write a clear financial report in 3 short paragraphs (financial health, key risks, recommendations):\n\nContract: ${active.name}\nClient: ${active.client || "N/A"}\nContract Value: AED ${active.value}\nAdditional Revenue: AED ${rev}\nExpenses: AED ${exp}\nSalaries: AED ${sal}\nOther Costs: AED ${oth}\nNet Balance: AED ${net}\nEntries: ${active.items.map(i=>`[${i.type}] ${i.desc}: AED ${i.amount}`).join(", ") || "None"}`
          }]
        })
      });
      const d = await res.json();
      setAiText(d.content?.[0]?.text || "No response.");
    } catch { setAiText("Unable to connect to AI. Please try again."); }
    setAiLoading(false);
  }

  // Styles
  const inp = { width: "100%", border: "1.5px solid #e2e8f0", borderRadius: 10,
    padding: "12px 14px", fontSize: 16, outline: "none", background: "#f8faf8",
    boxSizing: "border-box", color: "#1a2e1a" };
  const lbl = { fontSize: 11, color: "#64748b", textTransform: "uppercase",
    letterSpacing: "0.08em", marginBottom: 6, display: "block", fontWeight: 600 };
  const btnG = { background: "linear-gradient(135deg,#1a7a4a,#22a060)", border: "none",
    borderRadius: 10, padding: "12px 20px", color: "#fff", fontWeight: 700, fontSize: 14 };
  const btnO = { background: "#fff", border: "1.5px solid #e2e8f0", borderRadius: 10,
    padding: "12px 18px", color: "#64748b", fontWeight: 600, fontSize: 14 };

  const rev = active?.items.filter(i=>i.type==="Revenue").reduce((s,i)=>s+i.amount,0)||0;
  const exp = active?.items.filter(i=>i.type==="Expense").reduce((s,i)=>s+i.amount,0)||0;
  const sal = active?.items.filter(i=>i.type==="Salary").reduce((s,i)=>s+i.amount,0)||0;
  const oth = active?.items.filter(i=>i.type==="Other").reduce((s,i)=>s+i.amount,0)||0;
  const net = (active?.value||0) + rev - exp - sal - oth;
  const margin = active?.value > 0 ? ((net/active.value)*100).toFixed(1) : "—";

  return (
    <div style={{ minHeight:"100vh", background:"#f4f7f4" }}>

      {/* NAV */}
      <nav className="nav-pad" style={{ background:"#fff", borderBottom:"1.5px solid #e8ede9",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        height:60, position:"sticky", top:0, zIndex:100, padding:"0 20px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer" }}
          onClick={() => setPage("home")}>
          <div style={{ width:36, height:36, background:"linear-gradient(135deg,#1a7a4a,#22a060)",
            borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>📊</div>
          <div>
            <div style={{ fontSize:15, fontWeight:800, color:"#1a2e1a", lineHeight:1.2 }}>
              Contract Accountant <span style={{ color:"#1a7a4a", fontSize:10, fontWeight:800,
                background:"#e6f4ee", borderRadius:4, padding:"2px 5px" }}>PRO</span>
            </div>
            <div className="nav-title-sub" style={{ fontSize:11, color:"#94a3b8" }}>Smart Multi-Contract Financial Tracker</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          {/* Sync indicator */}
          <div style={{ fontSize:11, color: syncStatus==="error"?"#c0392b":syncStatus==="loading"?"#e67e22":"#1a7a4a",
            display:"flex", alignItems:"center", gap:4, marginRight:4 }}>
            {syncStatus==="loading" && <span>⟳ Syncing…</span>}
            {syncStatus==="saving" && <span>⟳ Saving…</span>}
            {syncStatus==="saved" && <span>☁️ Saved</span>}
            {syncStatus==="synced" && <span>☁️ Synced</span>}
            {syncStatus==="error" && <span>⚠️ Offline</span>}
          </div>
          {page==="detail" && active && <>
            <button onClick={()=>{setForm({...active});setPage("edit-contract");}} style={btnO}>Edit</button>
            <button onClick={()=>{setPage("new-item");setForm({type:"Expense"});}} style={btnG}>+ Entry</button>
          </>}
          {page==="home" && (
            <button onClick={()=>{setPage("new-contract");setForm({});}} style={btnG}>+ New Contract</button>
          )}
          {["new-contract","new-item","edit-contract"].includes(page) && (
            <button onClick={()=>setPage(activeId?"detail":"home")} style={btnO}>← Back</button>
          )}
        </div>
      </nav>

      {/* BODY */}
      <div className="body-pad" style={{ maxWidth:900, margin:"0 auto", padding:"28px 20px" }}>

        {/* ══ HOME ══ */}
        {page==="home" && <>
          <h1 className="page-title" style={{ fontSize:32, fontWeight:800, color:"#1a2e1a",
            marginBottom:6, letterSpacing:"-0.02em" }}>
            Your <span style={{ color:"#1a7a4a" }}>Contracts</span>
          </h1>
          <p style={{ color:"#64748b", marginBottom:24, fontSize:14 }}>
            {contracts.length} contract{contracts.length!==1?"s":""} · tap to manage
          </p>
          {/* Global backup bar */}
          <div style={{ display:"flex", gap:10, marginBottom:24, flexWrap:"wrap", alignItems:"center" }}>
            <button style={{ ...btnO, fontSize:13, padding:"9px 16px" }} onClick={exportData}>⬇ Export Backup</button>
            <label style={{ ...btnO, fontSize:13, padding:"9px 16px", display:"inline-flex", alignItems:"center", cursor:"pointer" }}>
              ⬆ Import Backup
              <input type="file" accept=".json" style={{ display:"none" }} onChange={importData} />
            </label>
            <span style={{ fontSize:12, color:"#94a3b8" }}>Save your data regularly to avoid losing it</span>
          </div>

          <div className="contract-cards" style={{ display:"grid",
            gridTemplateColumns:"repeat(auto-fill, minmax(260px,1fr))", gap:14 }}>
            {contracts.map(c => {
              const cRev = c.items.filter(i=>i.type==="Revenue").reduce((s,i)=>s+i.amount,0);
              const cExp = c.items.filter(i=>["Expense","Salary","Other"].includes(i.type)).reduce((s,i)=>s+i.amount,0);
              const cNet = c.value + cRev - cExp;
              return (
                <div key={c.id} onClick={()=>openContract(c.id)} style={{
                  background:"#fff", border:"1.5px solid #e8ede9", borderRadius:16,
                  padding:"20px 20px 16px", cursor:"pointer", transition:"box-shadow 0.2s",
                  boxShadow:"0 1px 4px rgba(0,0,0,0.04)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between",
                    alignItems:"flex-start", marginBottom:10 }}>
                    <div style={{ fontSize:15, fontWeight:700, color:"#1a2e1a",
                      lineHeight:1.3, flex:1, marginRight:8 }}>{c.name}</div>
                    <span style={{ fontSize:11, color:"#94a3b8", background:"#f4f7f4",
                      borderRadius:6, padding:"3px 7px", whiteSpace:"nowrap" }}>
                      {c.items.length} entries
                    </span>
                  </div>
                  <div style={{ fontSize:12, color:"#94a3b8", marginBottom:14,
                    overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {c.client || "No client"}
                  </div>
                  <div style={{ borderTop:"1px solid #f0f0f0", paddingTop:12 }}>
                    <div style={{ fontSize:11, color:"#94a3b8", marginBottom:3 }}>Contract Value</div>
                    <div style={{ fontSize:15, fontWeight:700, color:"#1a2e1a" }}>{fmt(c.value)}</div>
                  </div>
                  <div style={{ marginTop:10, display:"flex", justifyContent:"space-between" }}>
                    <div style={{ fontSize:11, color:"#94a3b8" }}>Net Balance</div>
                    <div style={{ fontSize:14, fontWeight:800, color:cNet>=0?"#1a7a4a":"#c0392b" }}>
                      {cNet>=0?"+":""}{fmt(cNet)}
                    </div>
                  </div>
                </div>
              );
            })}
            <div onClick={()=>{setPage("new-contract");setForm({});}} style={{
              border:"2px dashed #c8d8cc", borderRadius:16, padding:"20px",
              cursor:"pointer", display:"flex", flexDirection:"column",
              alignItems:"center", justifyContent:"center", minHeight:150, color:"#94a3b8" }}>
              <div style={{ fontSize:28, marginBottom:6 }}>+</div>
              <div style={{ fontSize:13, fontWeight:600 }}>Add New Contract</div>
            </div>
          </div>
        </>}

        {/* ══ NEW / EDIT CONTRACT ══ */}
        {(page==="new-contract"||page==="edit-contract") && (
          <div style={{ background:"#fff", border:"1.5px solid #e8ede9",
            borderRadius:18, padding:28, maxWidth:640 }}>
            <h2 className="form-title" style={{ fontSize:24, fontWeight:800, color:"#1a2e1a", marginBottom:24 }}>
              {page==="edit-contract"?"Edit Contract":"New Contract"}
            </h2>
            <div className="grid-2" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
              <div className="span-2" style={{ gridColumn:"span 2" }}>
                <label style={lbl}>Contract Name *</label>
                <input style={inp} value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Villa Project" />
              </div>
              <div className="span-2" style={{ gridColumn:"span 2" }}>
                <label style={lbl}>Client / Owner</label>
                <input style={inp} value={form.client||""} onChange={e=>setForm({...form,client:e.target.value})} />
              </div>
              <div>
                <label style={lbl}>Contract Value (AED)</label>
                <input type="number" style={inp} value={form.value||""} onChange={e=>setForm({...form,value:e.target.value})} placeholder="0.00" />
              </div>
              <div>
                <label style={lbl}>Start Date</label>
                <input type="date" style={inp} value={form.startDate||""} onChange={e=>setForm({...form,startDate:e.target.value})} />
              </div>
            </div>
            <div style={{ marginBottom:22 }}>
              <label style={lbl}>Notes / Description</label>
              <textarea style={{ ...inp, minHeight:80, resize:"vertical" }}
                value={form.notes||""} onChange={e=>setForm({...form,notes:e.target.value})} />
            </div>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              <button style={btnG} onClick={saveContract}>
                {page==="edit-contract"?"Save Changes":"Create Contract"}
              </button>
              <button style={btnO} onClick={()=>setPage(activeId?"detail":"home")}>Cancel</button>
            </div>
          </div>
        )}

        {/* ══ NEW ITEM ══ */}
        {page==="new-item" && (
          <div style={{ background:"#fff", border:"1.5px solid #e8ede9",
            borderRadius:18, padding:28, maxWidth:640 }}>
            <h2 className="form-title" style={{ fontSize:24, fontWeight:800, color:"#1a2e1a", marginBottom:24 }}>Add Entry</h2>
            <div style={{ display:"grid", gap:14, marginBottom:20 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
                <div>
                  <label style={lbl}>Type</label>
                  <select style={inp} value={form.type||"Expense"} onChange={e=>setForm({...form,type:e.target.value})}>
                    {TYPES.map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <label style={lbl}>Date</label>
                  <input type="date" style={inp} value={form.date||""} onChange={e=>setForm({...form,date:e.target.value})} />
                </div>
              </div>
              <div>
                <label style={lbl}>Description *</label>
                <input style={inp} value={form.desc||""} onChange={e=>setForm({...form,desc:e.target.value})}
                  placeholder="e.g. Concrete supply, Ahmed salary, Invoice #3…" />
              </div>
              <div>
                <label style={lbl}>Amount (AED) *</label>
                <input type="number" style={inp} value={form.amount||""} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="0.00" />
              </div>
              <div>
                <label style={lbl}>Note (optional)</label>
                <input style={inp} value={form.note||""} onChange={e=>setForm({...form,note:e.target.value})}
                  placeholder="Any extra details…" />
              </div>
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button style={btnG} onClick={saveItem}>Save Entry</button>
              <button style={btnO} onClick={()=>setPage("detail")}>Cancel</button>
            </div>
          </div>
        )}

        {/* ══ DETAIL ══ */}
        {page==="detail" && active && <>
          {/* Breadcrumb */}
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:18,
            fontSize:13, color:"#94a3b8" }}>
            <span style={{ cursor:"pointer", color:"#1a7a4a", fontWeight:600 }}
              onClick={()=>setPage("home")}>Contracts</span>
            <span>›</span>
            <span style={{ color:"#1a2e1a", fontWeight:600 }}>{active.name}</span>
          </div>

          {/* Header card */}
          <div className="card-pad" style={{ background:"#fff", border:"1.5px solid #e8ede9",
            borderRadius:18, padding:24, marginBottom:16 }}>
            <div style={{ fontSize:11, color:"#94a3b8", marginBottom:5, fontWeight:600,
              textTransform:"uppercase", letterSpacing:"0.08em" }}>
              {active.client} {active.startDate ? `· ${active.startDate}` : ""}
            </div>
            <h2 style={{ fontSize:26, fontWeight:800, color:"#1a2e1a",
              letterSpacing:"-0.02em", marginBottom:active.notes?8:0 }}>{active.name}</h2>
            {active.notes && <p style={{ color:"#64748b", fontSize:13, lineHeight:1.6 }}>{active.notes}</p>}
          </div>

          {/* Stats */}
          <div className="stats-row" style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap" }}>
            <StatCard label="Contract Value" value={fmt(active.value)} color="#1a2e1a" />
            <StatCard label="+ Revenue" value={fmt(rev)} color="#1a7a4a" />
            <StatCard label="− Expenses" value={fmt(exp)} color="#c0392b" />
            <StatCard label="− Salaries" value={fmt(sal)} color="#e67e22" />
            <StatCard label="Net Balance" value={fmt(net)} color={net>=0?"#1a7a4a":"#c0392b"} sub={`Margin: ${margin}%`} />
          </div>

          {/* Entries */}
          <div className="card-pad" style={{ background:"#fff", border:"1.5px solid #e8ede9",
            borderRadius:18, padding:22, marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between",
              alignItems:"center", marginBottom:18 }}>
              <h3 style={{ fontSize:17, fontWeight:800, color:"#1a2e1a" }}>
                Entries <span style={{ fontSize:12, color:"#94a3b8", fontWeight:500 }}>({active.items.length})</span>
              </h3>
              <button style={btnG} onClick={()=>{setPage("new-item");setForm({type:"Expense"});}}>+ Add Entry</button>
            </div>
            {active.items.length===0 ? (
              <div style={{ textAlign:"center", padding:"32px 0", color:"#c8d8cc" }}>
                <div style={{ fontSize:32, marginBottom:8 }}>📋</div>
                <div style={{ fontSize:14, fontWeight:600, marginBottom:4 }}>No entries yet</div>
                <div style={{ fontSize:13 }}>Add expenses, salaries, or revenue</div>
              </div>
            ) : (
              <div style={{ overflowX:"auto" }}>
                <table>
                  <thead>
                    <tr style={{ borderBottom:"2px solid #f0f4f0" }}>
                      {["Type","Description","Date","Amount",""].map(h=>(
                        <th key={h} style={{ textAlign:"left", padding:"8px 10px",
                          fontSize:10, color:"#94a3b8", textTransform:"uppercase",
                          letterSpacing:"0.08em", fontWeight:600, whiteSpace:"nowrap" }}
                          className={h==="Date"?"entry-date":""}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {active.items.map(item=>(
                      <tr key={item.id} style={{ borderBottom:"1px solid #f8faf8" }}>
                        <td style={{ padding:"12px 10px" }}><Badge type={item.type} /></td>
                        <td style={{ padding:"12px 10px", fontSize:14, color:"#1a2e1a", fontWeight:500 }}>
                          {item.desc}
                          {item.note && <div style={{ fontSize:11, color:"#94a3b8", marginTop:2 }}>{item.note}</div>}
                        </td>
                        <td className="entry-date" style={{ padding:"12px 10px", fontSize:12, color:"#94a3b8" }}>{item.date||"—"}</td>
                        <td style={{ padding:"12px 10px", fontSize:13, fontWeight:700,
                          color:item.type==="Revenue"?"#1a7a4a":"#c0392b", whiteSpace:"nowrap" }}>
                          {item.type==="Revenue"?"+":"−"}{fmt(item.amount)}
                        </td>
                        <td style={{ padding:"12px 6px" }}>
                          <button onClick={()=>deleteItem(item.id)} style={{
                            background:"none", border:"none", color:"#d0d8d0", fontSize:16, padding:"4px 8px" }}>✕</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* AI Report */}
          <div className="card-pad" style={{ background:"#fff", border:"1.5px solid #e8ede9",
            borderRadius:18, padding:22, marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between",
              alignItems:"center", marginBottom:aiText?18:0 }}>
              <div>
                <h3 style={{ fontSize:17, fontWeight:800, color:"#1a2e1a", marginBottom:3 }}>AI Financial Report</h3>
                {!aiText && <p style={{ fontSize:12, color:"#94a3b8" }}>Instant AI-powered analysis</p>}
              </div>
              <button style={btnG} onClick={generateAI} disabled={aiLoading}>
                {aiLoading?"Analyzing…":"Generate Report"}
              </button>
            </div>
            {aiText && (
              <div style={{ background:"#f8faf8", borderRadius:12, padding:18,
                fontSize:14, lineHeight:1.85, color:"#334155",
                borderLeft:"3px solid #1a7a4a", whiteSpace:"pre-wrap" }}>{aiText}</div>
            )}
          </div>

          {/* Export / Import */}
          <div className="card-pad" style={{ background:"#fff", border:"1.5px solid #e8ede9",
            borderRadius:18, padding:22, marginBottom:16 }}>
            <h3 style={{ fontSize:17, fontWeight:800, color:"#1a2e1a", marginBottom:6 }}>Backup & Restore</h3>
            <p style={{ fontSize:12, color:"#94a3b8", marginBottom:16 }}>Export all your contracts data as a backup file, or import a previous backup.</p>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              <button style={btnG} onClick={exportData}>⬇ Export Backup</button>
              <label style={{ ...btnO, display:"inline-flex", alignItems:"center", cursor:"pointer" }}>
                ⬆ Import Backup
                <input type="file" accept=".json" style={{ display:"none" }} onChange={importData} />
              </label>
            </div>
          </div>

          {/* Delete */}
          {deleteConfirm===active.id ? (
            <div style={{ background:"#fff5f5", border:"1.5px solid #fca5a5",
              borderRadius:12, padding:16, display:"flex",
              justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
              <span style={{ fontSize:13, color:"#7f1d1d" }}>Delete "{active.name}" permanently?</span>
              <div style={{ display:"flex", gap:10 }}>
                <button style={{ ...btnO, borderColor:"#fca5a5", color:"#c0392b" }}
                  onClick={()=>deleteContract(active.id)}>Yes, Delete</button>
                <button style={btnO} onClick={()=>setDeleteConfirm(null)}>Cancel</button>
              </div>
            </div>
          ) : (
            <div style={{ textAlign:"right", paddingBottom:40 }}>
              <button onClick={()=>setDeleteConfirm(active.id)} style={{
                background:"none", border:"none", color:"#ccc", fontSize:13 }}>
                🗑 Delete this contract
              </button>
            </div>
          )}
        </>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
