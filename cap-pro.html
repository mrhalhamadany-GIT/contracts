<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="CAP"/>
  <title>Contract Accountant PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#100d07; --bg2:#150f09; --card:#1e160b; --card2:#261c0e;
      --border:rgba(255,210,140,0.09); --border2:rgba(255,210,140,0.16);
      --border-a:rgba(251,191,36,0.35);
      --a:#f59e0b; --a2:#d97706; --a3:#fbbf24; --a4:#fde68a;
      --pos:#34d399; --pos2:#10b981;
      --neg:#f87171; --neg2:#ef4444;
      --gold:#fbbf24; --gold2:#f59e0b;
      --blue:#60a5fa; --purple:#c084fc; --cyan:#22d3ee; --yellow:#facc15;
      --t1:#f5ede0; --t2:#c4ae96; --t3:#8a7260; --t4:#4a3828; --t5:#2a1e10;
      --radius:20px; --radius-sm:12px;
      --nav-h:62px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
    input,select,textarea,button{font-family:'Plus Jakarta Sans',sans-serif}
    button{cursor:pointer}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--t5);border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:var(--t4)}

    /* ── ANIMATIONS ── */
    @keyframes fadeUp{0%{opacity:0;transform:translateY(24px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
    @keyframes slideRight{0%{opacity:0;transform:translateX(-16px)}100%{opacity:1;transform:translateX(0)}}
    @keyframes scaleIn{0%{opacity:0;transform:scale(0.93)}100%{opacity:1;transform:scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes ripple{0%{transform:scale(0);opacity:0.45}100%{transform:scale(4);opacity:0}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
    @keyframes cardReveal{0%{opacity:0;transform:translateY(28px) scale(0.96)}100%{opacity:1;transform:translateY(0) scale(1)}}

    /* ── BACKGROUND — warm obsidian depth ── */
    .bg-base{position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 85% 55% at 75% -8%, rgba(251,191,36,0.22) 0%, transparent 58%),
        radial-gradient(ellipse 55% 45% at -8% 85%, rgba(245,158,11,0.13) 0%, transparent 55%),
        radial-gradient(ellipse 45% 40% at 50% 110%, rgba(180,100,0,0.12) 0%, transparent 55%),
        linear-gradient(160deg, #1a1208 0%, #120e06 45%, #0f0b04 100%)}
    .bg-dots{position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        linear-gradient(rgba(251,191,36,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(251,191,36,0.045) 1px, transparent 1px);
      background-size:48px 48px;
      mask-image:radial-gradient(ellipse 85% 75% at 50% 30%, black 0%, transparent 100%);
      -webkit-mask-image:radial-gradient(ellipse 85% 75% at 50% 30%, black 0%, transparent 100%)}
    /* Top accent line — gold */
    .bg-topline{position:fixed;top:0;left:0;right:0;height:1px;z-index:101;
      background:linear-gradient(90deg,transparent 0%,rgba(251,191,36,0.65) 25%,rgba(253,211,77,0.95) 50%,rgba(251,191,36,0.65) 75%,transparent 100%)}
    .noise{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.022;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:180px}

    /* ── INTERACTIVE CARD ── */
    .icard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      transition:border-color 0.28s,transform 0.28s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.28s;
      position:relative;overflow:hidden}
    .icard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:20px 20px 0 0;
      background:linear-gradient(90deg,transparent,rgba(251,191,36,0.2),transparent);transition:background 0.3s}
    .icard::after{content:'';position:absolute;inset:0;border-radius:inherit;
      background:linear-gradient(135deg,rgba(251,191,36,0.04) 0%,transparent 55%);opacity:0;transition:opacity 0.3s}
    .icard:hover{border-color:var(--border-a);transform:translateY(-4px);
      box-shadow:0 20px 56px rgba(0,0,0,0.5),0 0 0 1px rgba(251,191,36,0.1),0 0 32px rgba(251,191,36,0.06)}
    .icard:hover::before{background:linear-gradient(90deg,transparent,rgba(251,191,36,0.6),transparent)}
    .icard:hover::after{opacity:1}
    .icard:active{transform:translateY(-1px) scale(0.99)}

    /* ── BUTTONS ── */
    .btn-p{background:linear-gradient(145deg,#92400e,var(--a2),var(--a));border:none;border-radius:var(--radius-sm);padding:11px 20px;color:#1a0f00;font-weight:700;font-size:13px;letter-spacing:0.01em;box-shadow:0 4px 20px rgba(245,158,11,0.38),inset 0 1px 0 rgba(255,255,255,0.22);transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden}
    .btn-p:hover{box-shadow:0 8px 32px rgba(245,158,11,0.58),inset 0 1px 0 rgba(255,255,255,0.26);transform:translateY(-2px) scale(1.02)}
    .btn-p:active{transform:scale(0.98);box-shadow:0 2px 10px rgba(245,158,11,0.28)}
    .btn-p:disabled{opacity:0.42;pointer-events:none}
    .btn-g{background:rgba(255,255,255,0.045);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 18px;color:var(--t2);font-weight:500;font-size:13px;transition:all 0.2s;outline:none}
    .btn-g:hover{background:rgba(251,191,36,0.09);border-color:rgba(251,191,36,0.28);color:var(--a3);transform:translateY(-1px)}
    .btn-g:active{transform:scale(0.97)}
    .btn-sm{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--t3);font-size:12px;font-weight:500;transition:all 0.2s;outline:none}
    .btn-sm:hover{background:rgba(255,255,255,0.07);color:var(--t2);border-color:var(--border2);transform:translateY(-1px)}
    .btn-icon{background:none;border:none;padding:5px 7px;border-radius:7px;cursor:pointer;transition:all 0.17s;line-height:1;display:inline-flex;align-items:center;justify-content:center}
    .btn-danger{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:var(--radius-sm);padding:11px 22px;color:#fca5a5;font-weight:700;font-size:13px;transition:all 0.2s;cursor:pointer;outline:none}
    .btn-danger:hover{background:rgba(248,113,113,0.15);border-color:rgba(248,113,113,0.4);transform:translateY(-1px)}

    /* ── INPUTS ── */
    .inp{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);padding:13px 16px;font-size:14px;color:var(--t1);transition:all 0.22s;outline:none;appearance:none;-webkit-appearance:none}
    .inp:focus{border-color:var(--a);background:rgba(245,158,11,0.06);box-shadow:0 0 0 3px rgba(245,158,11,0.14)}
    .inp::placeholder{color:var(--t5)}
    .inp.error{border-color:var(--neg)!important;box-shadow:0 0 0 3px rgba(248,113,113,0.13)!important;animation:shake 0.3s ease}
    .inp::-webkit-calendar-picker-indicator{filter:invert(0.5) sepia(1) hue-rotate(200deg);cursor:pointer}
    label.lbl{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:0.11em;margin-bottom:7px;display:flex;align-items:center;gap:4px;font-weight:700}
    .req{color:var(--neg);font-size:12px;line-height:1}
    .inp-wrap{position:relative}

    /* ── TYPE BUTTONS ── */
    .type-btn{padding:10px 6px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.07);background:transparent;font-size:10.5px;font-weight:700;letter-spacing:0.03em;cursor:pointer;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);text-align:center;line-height:1.3}
    .type-btn:hover{transform:translateY(-2px) scale(1.04)}
    .type-btn.sel{transform:translateY(-2px) scale(1.05)}

    /* ── BADGE ── */
    .badge{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:0.04em;white-space:nowrap}

    /* ── STAT CARD ── */
    .stat{flex:1;min-width:110px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:16px 18px;position:relative;overflow:hidden;transition:all 0.25s}
    .stat:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.11);box-shadow:0 10px 36px rgba(0,0,0,0.35)}
    .stat-accent{position:absolute;top:0;left:0;right:0;height:2px}
    .stat-icon{position:absolute;right:14px;top:14px;font-size:18px;opacity:0.1}
    .stat-label{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:0.13em;margin-bottom:10px;font-weight:700}
    .stat-val{font-size:15px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1.2}
    .stat-sub{font-size:10px;color:var(--t4);margin-top:6px;font-weight:500}

    /* ── TABLE ── */
    table{width:100%;border-collapse:collapse}
    .trow{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.14s}
    .trow:hover{background:rgba(251,191,36,0.04)}
    .trow:last-child{border-bottom:none}
    th{text-align:left;padding:9px 14px;font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:0.13em;font-weight:700;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,0.06)}
    td{padding:11px 14px;vertical-align:middle}
    /* Row actions — hidden until row hovered */
    .trow .row-actions{opacity:0;transition:opacity 0.15s}
    .trow:hover .row-actions{opacity:1}

    /* ── PROGRESS ── */
    .prog-bg{background:rgba(255,255,255,0.055);border-radius:6px;height:3px;overflow:hidden;margin:12px 0 14px}
    .prog-fill{height:100%;border-radius:6px;transition:width 0.9s cubic-bezier(0.34,1.56,0.64,1)}

    /* ── SYNC DOT ── */
    .sync-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
    .sync-dot.pulse{animation:pulse 1.5s ease infinite}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);
      background:rgba(20,13,5,0.97);border:1px solid rgba(251,191,36,0.28);border-radius:14px;
      padding:12px 22px;font-size:13px;color:var(--a4);font-weight:600;z-index:9999;
      transition:transform 0.38s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;
      box-shadow:0 16px 48px rgba(0,0,0,0.6),0 0 0 1px rgba(251,191,36,0.07);
      backdrop-filter:blur(20px);display:flex;align-items:center;gap:8px}
    .toast.show{transform:translateX(-50%) translateY(0)}

    /* ── NAV ── */
    .nav{background:rgba(12,9,5,0.96);backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);
      border-bottom:1px solid rgba(255,255,255,0.06);height:var(--nav-h);position:sticky;top:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;padding:0 28px}

    /* ── MODAL OVERLAY ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;
      justify-content:center;animation:fadeIn 0.18s ease;padding:20px}
    .modal-card{animation:scaleIn 0.26s cubic-bezier(0.34,1.56,0.64,1);background:#110d07;
      border:1px solid rgba(255,255,255,0.09);border-radius:24px;padding:32px;width:100%;
      overflow-y:auto;box-shadow:0 48px 120px rgba(0,0,0,0.75),0 0 0 1px rgba(251,191,36,0.07);position:relative}
    .modal-top{position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(251,191,36,0.55),transparent);border-radius:24px 24px 0 0}

    /* ── HERO BANNER ── */
    .hero-banner{background:linear-gradient(135deg,rgba(120,80,0,0.22) 0%,rgba(80,50,0,0.1) 50%,rgba(251,191,36,0.1) 100%);
      border:1px solid rgba(251,191,36,0.15);border-radius:24px;padding:28px 32px;position:relative;overflow:hidden}
    .hero-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(251,191,36,0.55),transparent)}
    .hero-banner::after{content:'';position:absolute;bottom:-20px;right:-20px;width:280px;height:280px;
      background:radial-gradient(circle,rgba(251,191,36,0.07) 0%,transparent 65%);pointer-events:none}

    /* ── SECTION CARD ── */
    .sect{background:rgba(14,10,5,0.96);border:1px solid var(--border);border-radius:20px;padding:22px 26px;position:relative;overflow:hidden}
    .sect::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent)}

    /* ── SEARCH ── */
    .search-wrap{position:relative}
    .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t5);font-size:13px;pointer-events:none}
    .search-inp{padding-left:36px!important}

    /* ── AI BUBBLE ── */
    .ai-bubble{background:linear-gradient(135deg,rgba(245,158,11,0.05),rgba(60,40,0,0.03));
      border:1px solid rgba(251,191,36,0.15);border-radius:16px;padding:20px 22px;
      font-size:13px;line-height:1.95;color:#c0c8f0;white-space:pre-wrap;animation:fadeIn 0.4s ease}

    /* ── BREAKDOWN BARS ── */
    .bk-row{display:flex;align-items:center;gap:10px;padding:6px 0}
    .bk-bar-bg{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
    .bk-bar{height:100%;border-radius:4px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1)}

    /* ── EMPTY STATE ── */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 20px;text-align:center}
    .empty-icon{width:60px;height:60px;border-radius:18px;background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.12);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;color:var(--t3)}

    /* ── PILL TABS ── */
    .pill-tab{padding:7px 14px;border-radius:20px;font-size:11.5px;font-weight:600;border:none;background:transparent;color:var(--t4);cursor:pointer;transition:all 0.18s;letter-spacing:0.01em;white-space:nowrap}
    .pill-tab.active{background:rgba(251,191,36,0.15);color:var(--a3);box-shadow:0 0 0 1px rgba(251,191,36,0.32)}
    .pill-tab:hover:not(.active){color:var(--t2)}

    /* ── BUDGET BADGE ── */
    .budget-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:0.04em;white-space:nowrap}
    .budget-over{background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3)}
    .budget-high{background:rgba(251,191,36,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.28)}
    .budget-ok{background:rgba(52,211,153,0.1);color:#34d399;border:1px solid rgba(52,211,153,0.25)}
    /* ── CHART CONTAINER ── */
    .chart-wrap{position:relative;width:100%}
    /* ── DATE FILTER ── */
    .date-preset{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;border:none;background:transparent;color:var(--t3);cursor:pointer;transition:all 0.15s;white-space:nowrap}
    .date-preset.active{background:rgba(251,191,36,0.15);color:var(--a3);box-shadow:0 0 0 1px rgba(251,191,36,0.3)}
    .date-preset:hover:not(.active){color:var(--t1)}
    /* ── MONTH GROUP ── */
    .month-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;cursor:pointer;user-select:none;border-bottom:1px solid rgba(255,255,255,0.05)}
    .month-header:hover .month-label{color:var(--a3)}
    .month-label{font-size:12px;font-weight:700;color:var(--t2);transition:color 0.15s}
    .month-stats{display:flex;gap:16px;font-size:11px;font-variant-numeric:tabular-nums}

    /* ── DASHBOARD ── */
    .dash-kpi{border-radius:20px;padding:22px 24px;position:relative;overflow:hidden;transition:all 0.32s cubic-bezier(0.16,1,0.3,1);flex:1 1 160px;min-width:140px}
    .dash-kpi:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.45)}
    .dash-kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:0.14em;font-weight:700;margin-bottom:12px;opacity:0.75}
    .dash-kpi-val{font-size:24px;font-weight:800;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;line-height:1.1;margin-bottom:6px}
    .dash-kpi-sub{font-size:10px;font-weight:500;opacity:0.45}
    .nav-tab{padding:7px 18px;border-radius:10px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--t3);cursor:pointer;transition:all 0.2s;letter-spacing:0.01em;white-space:nowrap}
    .nav-tab.active{background:rgba(251,191,36,0.18);color:var(--a3);box-shadow:0 0 0 1px rgba(251,191,36,0.32)}
    .nav-tab:hover:not(.active){color:var(--t1);background:rgba(255,255,255,0.05)}

    /* ── DIVIDER ── */
    .divider{height:1px;background:rgba(255,255,255,0.055);margin:18px 0}

    /* ── DASHBOARD GRIDS ── */
    .dash-grid-charts{display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:16px}
    .dash-grid-main{display:grid;grid-template-columns:1fr 300px;gap:16px;margin-bottom:16px}

    /* ── HERO STATS ── */
    .hero-stats{display:flex;gap:36px;flex-wrap:wrap;align-items:flex-start}

    /* ── MOBILE BOTTOM NAV ── */
    .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;
      background:rgba(12,9,5,0.97);border-top:1px solid rgba(255,210,140,0.12);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      padding:6px 0 env(safe-area-inset-bottom,6px)}
    .mobile-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
      background:none;border:none;color:var(--t4);font-size:10px;font-weight:600;
      cursor:pointer;padding:8px 4px;transition:color 0.18s;letter-spacing:0.03em;line-height:1}
    .mobile-nav-btn .mn-icon{font-size:20px;line-height:1;margin-bottom:2px}
    .mobile-nav-btn.active{color:var(--a3)}
    .mobile-nav-btn.active .mn-icon{filter:drop-shadow(0 0 6px rgba(251,191,36,0.5))}
    .mobile-nav-btn.primary{color:var(--a3)}

    /* ── RESPONSIVE ── */
    @media(max-width:640px){
      .hide-mob{display:none!important}
      .cards-grid{grid-template-columns:1fr!important}
      .stats-row{flex-wrap:wrap!important}
      .stats-row .stat{min-width:calc(50% - 5px)!important}
      .form-2col{grid-template-columns:1fr!important}
      .s2{grid-column:span 1!important}
      .wrap{padding:16px 14px 90px!important}
      .nav{padding:0 12px!important;height:54px;gap:8px}
      :root{--nav-h:54px}
      .type-grid{grid-template-columns:repeat(4,1fr)!important}
      .modal-card{padding:20px 14px!important;border-radius:18px!important}
      .hero-banner{padding:18px 16px!important}
      .sect{padding:14px 14px!important}
      .mobile-nav{display:flex}
      .mob-hide-nav{display:none!important}
      .dash-grid-charts{grid-template-columns:1fr!important}
      .dash-grid-main{grid-template-columns:1fr!important}
      .dash-kpi{flex:1 1 calc(50% - 6px)!important;min-width:calc(50% - 6px)!important;padding:14px 12px!important}
      .dash-kpi-val{font-size:17px!important}

// ── ANIMATED NUMBER ───────────────────────────────────────────────────────────
function AnimNum({value,color}){
  const [disp,setDisp]=useState(0);
  const rafRef=useRef(null);
  const prevRef=useRef(0);
  useEffect(()=>{
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    const start=prevRef.current,end=value,dur=680,s=performance.now();
    const tick=()=>{
      const p=Math.min((performance.now()-s)/dur,1);
      const cur=start+(end-start)*(1-Math.pow(1-p,4));
      setDisp(cur);
      if(p<1)rafRef.current=requestAnimationFrame(tick);
      else{setDisp(end);prevRef.current=end;}
    };
    rafRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafRef.current);
  },[value]);
  return <span style={{color,fontVariantNumeric:"tabular-nums"}}>{fmt(disp)}</span>;
}

// ── RIPPLE BUTTON ─────────────────────────────────────────────────────────────
function RippleBtn({className,onClick,children,style,disabled,title}){
  const ref=useRef();
  function handleClick(e){
    if(disabled)return;
    const b=ref.current.getBoundingClientRect();
    const s=document.createElement("span");
    s.style.cssText=`position:absolute;border-radius:50%;background:rgba(255,255,255,0.2);width:70px;height:70px;margin-top:-35px;margin-left:-35px;left:${e.clientX-b.left}px;top:${e.clientY-b.top}px;animation:ripple 0.55s ease;pointer-events:none`;
    ref.current.appendChild(s);setTimeout(()=>s.remove(),560);
    if(onClick)onClick(e);
  }
  return <button ref={ref} className={className} onClick={handleClick} title={title}
    style={{...style,position:"relative",overflow:"hidden",opacity:disabled?0.42:1}} disabled={disabled}>
    {children}
  </button>;
}

// ── CHART COMPONENTS ──────────────────────────────────────────────────────────
function CashFlowChart({contracts}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current||typeof Chart==="undefined")return;
    const map={};
    contracts.forEach(c=>c.items.forEach(i=>{
      if(!i.date)return;
      const d=new Date(i.date+"T00:00:00");
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if(!map[k])map[k]={inc:0,exp:0};
      if(isIncome(i.type))map[k].inc+=i.amount;else map[k].exp+=i.amount;
    }));
    const keys=Object.keys(map).sort();
    if(!keys.length)return;
    const labels=keys.map(k=>{const[y,m]=k.split("-");return new Date(+y,+m-1,1).toLocaleDateString("en-AE",{month:"short",year:"numeric"});});
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:"line",data:{labels,datasets:[
      {label:"Income",data:keys.map(k=>map[k].inc),borderColor:"#34d399",backgroundColor:"rgba(52,211,153,0.08)",tension:0.4,fill:true,pointRadius:3,pointBackgroundColor:"#34d399"},
      {label:"Expenses",data:keys.map(k=>map[k].exp),borderColor:"#f87171",backgroundColor:"rgba(248,113,113,0.08)",tension:0.4,fill:true,pointRadius:3,pointBackgroundColor:"#f87171"}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#c4ae96",font:{size:11}}},tooltip:{mode:"index",intersect:false,callbacks:{label:ctx=>`${ctx.dataset.label}: AED ${ctx.raw.toLocaleString()}`}}},
      scales:{x:{ticks:{color:"#8a7260",font:{size:10}},grid:{color:"rgba(255,255,255,0.04)"}},y:{ticks:{color:"#8a7260",font:{size:10},callback:v=>"AED "+(v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(0)+"K":v)},grid:{color:"rgba(255,255,255,0.04)"}}}
    }});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[contracts]);
  return <div className="chart-wrap" style={{height:220}}><canvas ref={ref}/></div>;
}
function CostDonutChart({contracts}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current||typeof Chart==="undefined")return;
    const byType={};
    contracts.forEach(c=>c.items.filter(i=>!isIncome(i.type)).forEach(i=>{byType[i.type]=(byType[i.type]||0)+i.amount;}));
    const labels=Object.keys(byType);const data=Object.values(byType);
    if(!labels.length)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:labels.map(t=>TC[t]?.c||"#888"),borderColor:"rgba(14,10,5,0.9)",borderWidth:3,hoverOffset:6}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"65%",
        plugins:{legend:{position:"right",labels:{color:"#c4ae96",font:{size:11},padding:12,boxWidth:12}},
          tooltip:{callbacks:{label:ctx=>`${ctx.label}: AED ${ctx.raw.toLocaleString("en",{minimumFractionDigits:0})}`}}
        }
      }});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[contracts]);
  return <div className="chart-wrap" style={{height:200}}><canvas ref={ref}/></div>;
}

                          <div style={{fontSize:11,color:"var(--gold)",fontVariantNumeric:"tabular-nums"}}>{fmtShort(c.value)}</div>
                        </div>
                        <div style={{textAlign:"right",minWidth:72}}>
                          <div style={{fontSize:9,color:"var(--t5)",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:2}}>Net</div>
                          <div style={{fontSize:12,fontWeight:700,color:n>=0?"#34d399":"#f87171",fontVariantNumeric:"tabular-nums"}}>{n>=0?"+":""}{fmtShort(n)}</div>
                        </div>
                      </div>
                    </div>
                    <div style={{background:"rgba(255,255,255,0.05)",borderRadius:6,height:5,overflow:"hidden",marginBottom:5}}>
                      <div style={{height:"100%",borderRadius:6,width:pct+"%",background:barColor,transition:"width 1.1s cubic-bezier(0.34,1.56,0.64,1)"}}/>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2}}>
                      <span style={{fontSize:9.5,color:"var(--t5)"}}>{pct.toFixed(0)}% budget used · {c.items.length} {c.items.length===1?"entry":"entries"}</span>
                      <BudgetBadge pct={pct}/>
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </div>

        {/* Right column */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>

          {/* Cost Breakdown */}
          <div className="sect" style={{background:"rgba(14,10,5,0.96)"}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:18}}>Cost Breakdown</div>
            {costByType.length===0
              ?<div style={{textAlign:"center",padding:"18px 0",fontSize:12,color:"var(--t5)"}}>No costs recorded</div>
              :<div style={{display:"flex",flexDirection:"column",gap:15}}>
                {costByType.map(x=>(
                  <div key={x.type}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <div style={{width:7,height:7,borderRadius:"50%",background:TC[x.type]?.c||"var(--a)",flexShrink:0,boxShadow:`0 0 7px ${TC[x.type]?.c||"var(--a)"}`}}/>
                        <span style={{fontSize:11,fontWeight:600,color:TC[x.type]?.c||"var(--t2)"}}>{x.type}</span>
                      </div>
                      <span style={{fontSize:11,fontWeight:700,color:"var(--t1)",fontVariantNumeric:"tabular-nums"}}>{fmtShort(x.amount)}</span>
                    </div>
                    <div style={{background:"rgba(255,255,255,0.05)",borderRadius:6,height:5,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:6,width:(x.amount/maxCost*100)+"%",background:TC[x.type]?.c||"var(--a)",opacity:0.8,transition:"width 1.1s cubic-bezier(0.34,1.56,0.64,1)"}}/>
                    </div>
                    <div style={{fontSize:9,color:"var(--t5)",marginTop:4}}>{totalCosts>0?((x.amount/totalCosts)*100).toFixed(1):0}% of total costs</div>
                  </div>
                ))}
              </div>
            }
          </div>

          {/* Portfolio Health */}
          <div className="sect" style={{background:"rgba(14,10,5,0.96)"}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:18}}>Portfolio Health</div>
            <div style={{display:"flex",alignItems:"center",gap:20}}>
              <div style={{position:"relative",width:72,height:72,flexShrink:0}}>
                <svg width="72" height="72" viewBox="0 0 72 72">
                  <circle cx="36" cy="36" r="29" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="7"/>
                  {healthPct>=100
                    ?<circle cx="36" cy="36" r="29" fill="none" stroke={hCol} strokeWidth="7"/>
                    :<circle cx="36" cy="36" r="29" fill="none" stroke={hCol} strokeWidth="7"
                      strokeDasharray={`${2*Math.PI*29*healthPct/100} ${2*Math.PI*29}`}
                      strokeDashoffset={2*Math.PI*29*0.25}
                      strokeLinecap="round"
                      style={{transition:"stroke-dasharray 1.3s cubic-bezier(0.34,1.56,0.64,1)"}}/>
                  }
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:hCol}}>{healthPct}%</div>
              </div>
              <div>
                <div style={{fontSize:17,fontWeight:800,color:"var(--t1)",marginBottom:3,letterSpacing:"-0.02em"}}>{profitable}<span style={{fontSize:12,color:"var(--t4)",fontWeight:500}}> / {contracts.length}</span></div>
                <div style={{fontSize:11,color:"var(--t4)",marginBottom:6}}>contracts profitable</div>
                <div style={{fontSize:10,fontWeight:700,color:hCol,display:"flex",alignItems:"center",gap:5}}>
                  <span style={{width:5,height:5,borderRadius:"50%",background:hCol,display:"inline-block",boxShadow:`0 0 6px ${hCol}`}}/>
                  {healthPct>=70?"Portfolio Healthy":healthPct>=40?"Needs Attention":"Action Required"}
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

      {/* Audit Log — admin only */}
      {!ro&&<div className="sect" style={{background:"rgba(14,10,5,0.96)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.1em"}}>Audit Log</div>
            <span style={{fontSize:10,color:"var(--t4)",fontWeight:500}}>{auditEntries.length} records</span>
            <span style={{fontSize:9,fontWeight:700,color:"#fbbf24",background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:6,padding:"2px 8px",letterSpacing:"0.05em"}}>READ ONLY</span>
          </div>
          {!ro&&auditEntries.length>0&&<div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:3}}>
            {[["1h","Past 1h"],["24h","Past 24h"],["all","Clear All"]].map(([k,label])=>(
              <button key={k} className="btn-sm" onClick={()=>{if(confirm(`Delete audit logs from ${label.toLowerCase()}?`))clearAudit(k);}}
                style={{padding:"4px 10px",fontSize:10,borderRadius:7,border:"none",background:"transparent",color:k==="all"?"#f87171":"var(--t3)"}}>
                {label}
              </button>
            ))}
          </div>}
        </div>
        {auditEntries.length===0
          ?<div style={{textAlign:"center",padding:"28px 0"}}>
            <div style={{fontSize:22,marginBottom:10,opacity:0.3}}>◎</div>
            <div style={{fontSize:12,color:"var(--t5)"}}>No changes recorded yet</div>
            <div style={{fontSize:10,color:"var(--t5)",marginTop:4,opacity:0.7}}>Actions like creating contracts or adding entries will appear here</div>
          </div>
          :<div style={{maxHeight:460,overflowY:"auto",paddingRight:2}}>
            {auditEntries.map((entry,i)=>{
              const isCreate=entry.action.includes("Created");
              const isDelete=entry.action.includes("Deleted");
              const isContractAction=entry.action.includes("Contract");
              const actionColor=isCreate?"#34d399":isDelete?"#f87171":isContractAction?"#fbbf24":"#f59e0b";
              const actionBg=isCreate?"rgba(52,211,153,0.1)":isDelete?"rgba(248,113,113,0.1)":isContractAction?"rgba(251,191,36,0.1)":"rgba(245,158,11,0.1)";
              const ts=new Date(entry.ts);
              const dateStr=ts.toLocaleDateString("en-AE",{day:"numeric",month:"short",year:"numeric"});
              const timeStr=ts.toLocaleTimeString("en-AE",{hour:"2-digit",minute:"2-digit",hour12:true});
              return(
                <div key={entry.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<auditEntries.length-1?"1px solid rgba(255,255,255,0.04)":"none",flexWrap:"nowrap",minWidth:0}}>
                  {/* Action badge */}
                  <div style={{background:actionBg,border:`1px solid ${actionColor}33`,borderRadius:8,padding:"3px 9px",fontSize:9,fontWeight:700,color:actionColor,whiteSpace:"nowrap",flexShrink:0,letterSpacing:"0.03em"}}>{entry.action}</div>
                  {/* Contract name */}
                  <span style={{fontSize:12,fontWeight:700,color:"var(--t1)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flexShrink:1,minWidth:0,maxWidth:180}}>{entry.contractName}</span>
                  {/* User badge */}
                  <span style={{fontSize:9,fontWeight:700,color:"var(--a3)",background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.22)",borderRadius:6,padding:"2px 7px",letterSpacing:"0.05em",whiteSpace:"nowrap",flexShrink:0}}>{entry.user}</span>
                  {/* Separator */}
                  <span style={{color:"var(--t5)",flexShrink:0,opacity:0.4}}>·</span>
                  {/* Detail */}
                  {entry.detail&&<span style={{fontSize:11,color:"var(--t3)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1,minWidth:0}}>{entry.detail}</span>}
                  {/* Timestamp — pushed to right */}
                  <span style={{fontSize:10.5,color:"var(--t2)",whiteSpace:"nowrap",flexShrink:0,marginLeft:"auto",fontWeight:600,letterSpacing:"0.01em"}}>{dateStr} · {timeStr}</span>
                </div>
              );
            })}
          </div>
        }
      </div>}
    </div>
  );
}

function DetailPage({active,rev,exp,sal,mat,oth,totalCost,net,margin,ro,filteredItems,search,setSearch,filter,setFilter,onBack,openModal,delItem,exportOnePDF,aiText,aiLoad,genAI}){
  if(!active)return null;
  const [datePreset,setDatePreset]=useState("all");
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [collapsed,setCollapsed]=useState({});

  // Date-filtered items on top of type/search filter
  const dateItems=useMemo(()=>{
    if(datePreset==="all"&&!dateFrom&&!dateTo)return filteredItems;
    const now=new Date();
    let from=null,to=null;
    if(datePreset==="month"){from=new Date(now.getFullYear(),now.getMonth(),1);}
    else if(datePreset==="3m"){from=new Date(now);from.setMonth(from.getMonth()-3);}
    else if(datePreset==="year"){from=new Date(now.getFullYear(),0,1);}
    else{from=dateFrom?new Date(dateFrom+"T00:00:00"):null;to=dateTo?new Date(dateTo+"T23:59:59"):null;}
    return filteredItems.filter(i=>{
      if(!i.date)return true;
      const d=new Date(i.date+"T00:00:00");
      if(from&&d<from)return false;
      if(to&&d>to)return false;
      return true;
    });
  },[filteredItems,datePreset,dateFrom,dateTo]);

  // Stats for filtered period
  const fRev=dateItems.filter(i=>isIncome(i.type)).reduce((s,i)=>s+i.amount,0);
  const fCost=dateItems.filter(i=>!isIncome(i.type)).reduce((s,i)=>s+i.amount,0);
  const fNet=(datePreset==="all"&&!dateFrom&&!dateTo)?net:active.value+fRev-fCost;
  const isFiltered=datePreset!=="all"||dateFrom||dateTo;


  // Monthly groups
  const monthGroups=useMemo(()=>{
    const map={};
    dateItems.forEach(i=>{
      if(!i.date)return;
      const d=new Date(i.date+"T00:00:00");
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      const label=d.toLocaleDateString("en-AE",{month:"long",year:"numeric"});
      if(!map[k])map[k]={label,items:[]};
      map[k].items.push(i);
    });
    return Object.entries(map).sort(([a],[b])=>b.localeCompare(a));
  },[dateItems]);

  const toggleMonth=k=>setCollapsed(c=>({...c,[k]:!c[k]}));

  return <div style={{animation:"fadeUp 0.4s cubic-bezier(0.16,1,0.3,1)"}}>

    {/* Breadcrumb */}
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:18,fontSize:12,justifyContent:"space-between",flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0,flex:1}}>
        <button style={{background:"none",border:"none",cursor:"pointer",color:"var(--t3)",fontWeight:500,transition:"color 0.15s",padding:0,fontSize:12,whiteSpace:"nowrap"}}
          onMouseEnter={e=>e.currentTarget.style.color="var(--a3)"} onMouseLeave={e=>e.currentTarget.style.color="var(--t3)"}
          onClick={onBack}>← Back</button>
        <span style={{color:"var(--t5)",fontSize:10}}>›</span>
        <span style={{color:"var(--t2)",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{active.name}</span>
      </div>
      <div className="breadcrumb-actions" style={{display:"flex",gap:8,flexShrink:0}}>
        {active.contractFile&&<a href={active.contractFile.url} target="_blank" rel="noopener noreferrer"
          className="btn-sm" style={{fontSize:11,padding:"5px 10px",color:"var(--a3)",borderColor:"rgba(251,191,36,0.25)",textDecoration:"none",display:"inline-flex",alignItems:"center",gap:4}}>📄 Doc</a>}
        <button className="btn-sm" onClick={()=>exportOnePDF(active)} style={{fontSize:11,padding:"5px 10px"}}>↑ PDF</button>
      </div>
    </div>

    {/* Header */}
    <div className="sect" style={{marginBottom:12}}>
      <div style={{position:"absolute",top:-50,right:-50,width:160,height:160,background:"radial-gradient(circle,rgba(251,191,36,0.07),transparent 70%)",pointerEvents:"none"}}/>
      <div style={{fontSize:10,color:"var(--t4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,fontWeight:700,display:"flex",flexWrap:"wrap",gap:"0 16px"}}>
        {active.client&&<span>{active.client}</span>}
        {active.startDate&&<span>Started {fmtDate(active.startDate)}</span>}
      </div>
      <h2 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:26,fontWeight:700,color:"var(--t1)",letterSpacing:"-0.025em",marginBottom:active.notes?12:0,lineHeight:1.2}}>{active.name}</h2>
      {active.notes&&<p style={{color:"var(--t3)",fontSize:13,lineHeight:1.75,maxWidth:620,borderLeft:"2px solid rgba(251,191,36,0.3)",paddingLeft:14}}>{active.notes}</p>}
      {!ro&&<button className="btn-sm" style={{marginTop:16}} onClick={()=>openModal("edit-contract",{...active})}>✎ Edit Details</button>}
    </div>

    {/* Stats */}
    <div className="stats-row" style={{display:"flex",gap:10,marginBottom:12,flexWrap:"nowrap",overflowX:"auto",paddingBottom:2}}>
      <Stat label="Contract Value" value={active.value} color="#fbbf24" icon="◇"/>
      <Stat label="Revenue +" value={rev} color="#34d399" icon="↑"/>
      <Stat label="Expenses −" value={exp} color="#f87171" icon="↓"/>
      <Stat label="Salaries −" value={sal} color="#fbbf24" icon="◎"/>
      <Stat label="Net Balance" value={net} color={net>=0?"#34d399":"#f87171"} sub={`${margin}% margin`} icon="◈"/>
    </div>

    {/* Cost Breakdown */}
    {totalCost>0&&<div className="sect" style={{marginBottom:12}}>
      <h3 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:14,fontWeight:600,color:"var(--t2)",marginBottom:16}}>Cost Breakdown</h3>
      {[{label:"Expenses",val:exp,color:"#f87171"},{label:"Salaries",val:sal,color:"#fbbf24"},{label:"Materials",val:mat,color:"#c084fc"},{label:"Other",val:oth,color:"#60a5fa"}]
        .filter(x=>x.val>0).map(({label,val,color})=>
        <div className="bk-row" key={label}>
          <div style={{fontSize:11,color:"var(--t3)",fontWeight:600,minWidth:72}}>{label}</div>
          <div className="bk-bar-bg"><div className="bk-bar" style={{width:`${(val/Math.max(totalCost,1))*100}%`,background:color}}/></div>
          <div style={{fontSize:11,color,fontWeight:700,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap",minWidth:90,textAlign:"right"}}>{fmtShort(val)}</div>
        </div>
      )}
      <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",fontSize:12}}>
        <span style={{color:"var(--t3)",fontWeight:600}}>Total Costs</span>
        <span style={{color:"#f87171",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(totalCost)}</span>
      </div>
    </div>}


    {/* Entries */}
    <div className="sect" style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <h3 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:15,fontWeight:600,color:"var(--t2)"}}>
          Entries <span style={{fontSize:12,color:"var(--t4)",fontWeight:400}}>({active.items.length})</span>
        </h3>
        {!ro&&<RippleBtn className="btn-p" style={{fontSize:12,padding:"9px 16px"}} onClick={()=>openModal("new-item",{date:today()})}>+ Add Entry</RippleBtn>}
      </div>

      {active.items.length>0&&<>
        {/* Type + Search filters */}
        <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          <div className="search-wrap" style={{flex:1,minWidth:160}}>
            <span className="search-icon">⌕</span>
            <input className="inp search-inp" value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search entries..." style={{fontSize:12,padding:"9px 12px 9px 34px"}}/>
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"nowrap",overflowX:"auto",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:22,padding:"3px",border:"1px solid var(--border)"}}>
            {["All",...TYPES].map(t=><button key={t} className={"pill-tab"+(filter===t?" active":"")} onClick={()=>setFilter(t)}>{t}</button>)}
          </div>
        </div>

        {/* Date range filter */}
        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",gap:2,background:"rgba(255,255,255,0.03)",border:"1px solid var(--border)",borderRadius:20,padding:"3px",flexWrap:"nowrap"}}>
            {[["all","All"],["month","This Month"],["3m","Last 3M"],["year","This Year"]].map(([k,l])=>(
              <button key={k} className={"date-preset"+(datePreset===k?" active":"")} onClick={()=>{setDatePreset(k);setDateFrom("");setDateTo("");}}>{l}</button>
            ))}
            <button className={"date-preset"+(datePreset==="custom"?" active":"")} onClick={()=>setDatePreset("custom")}>Custom</button>
          </div>
          {datePreset==="custom"&&<>
            <input type="date" className="inp" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{fontSize:11,padding:"6px 10px",width:130}}/>
            <span style={{color:"var(--t4)",fontSize:11}}>to</span>
            <input type="date" className="inp" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{fontSize:11,padding:"6px 10px",width:130}}/>
          </>}
          {isFiltered&&<span style={{fontSize:10,color:"var(--a3)",fontWeight:600}}>{dateItems.length} entries in period</span>}
        </div>

        {/* Filtered period summary */}
        {isFiltered&&<div style={{display:"flex",gap:16,padding:"10px 14px",background:"rgba(251,191,36,0.05)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:12,marginBottom:14,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:"var(--t3)"}}>Period:</span>
          <span style={{fontSize:11,fontWeight:700,color:"#34d399",fontVariantNumeric:"tabular-nums"}}>+{fmtShort(fRev)} in</span>
          <span style={{fontSize:11,fontWeight:700,color:"#f87171",fontVariantNumeric:"tabular-nums"}}>−{fmtShort(fCost)} out</span>
          <span style={{fontSize:11,fontWeight:700,color:fNet>=0?"#34d399":"#f87171",fontVariantNumeric:"tabular-nums"}}>= {fNet>=0?"+":""}{fmtShort(fNet)} net</span>
        </div>}
      </>}

      {active.items.length===0
        ?<div className="empty-state">
          <div className="empty-icon">◫</div>
          <div style={{fontSize:14,fontWeight:600,color:"var(--t3)",marginBottom:6}}>No entries yet</div>
          <div style={{fontSize:12,color:"var(--t4)",lineHeight:1.6}}>Add revenues, expenses, salaries and costs</div>
          {!ro&&<RippleBtn className="btn-p" style={{marginTop:20,fontSize:12,padding:"10px 22px"}} onClick={()=>openModal("new-item",{date:today()})}>Add First Entry</RippleBtn>}
        </div>
        :dateItems.length===0
          ?<div className="empty-state" style={{padding:"32px 0"}}>
            <div style={{fontSize:13,color:"var(--t4)"}}>No entries match your filters</div>
          </div>
          :<div>
            {monthGroups.map(([mk,{label,items:mItems}])=>{
              const mInc=mItems.filter(i=>isIncome(i.type)).reduce((s,i)=>s+i.amount,0);
              const mExp=mItems.filter(i=>!isIncome(i.type)).reduce((s,i)=>s+i.amount,0);
              const mNet=mInc-mExp;
              const open=!collapsed[mk];
              return <div key={mk} style={{marginBottom:4}}>
                <div className="month-header" onClick={()=>toggleMonth(mk)}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:10,color:"var(--t5)",transition:"transform 0.2s",display:"inline-block",transform:open?"rotate(90deg)":"rotate(0deg)"}}>›</span>
                    <span className="month-label">{label}</span>
                    <span style={{fontSize:10,color:"var(--t5)"}}>{mItems.length} {mItems.length===1?"entry":"entries"}</span>
                  </div>
                  <div className="month-stats">
                    <span style={{color:"#34d399"}}>+{fmtShort(mInc)}</span>
                    <span style={{color:"#f87171"}}>−{fmtShort(mExp)}</span>
                    <span style={{color:mNet>=0?"#34d399":"#f87171",fontWeight:700}}>{mNet>=0?"+":""}{fmtShort(mNet)}</span>
                  </div>
                </div>
                {open&&<div style={{overflowX:"auto"}}>
                  <table style={{minWidth:520,marginBottom:4}}>
                    <thead><tr>{["Type","Description","Date","Amount",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
                    <tbody>
                      {mItems.map((item,i)=><tr key={item.id} className="trow" style={{animation:`slideRight 0.18s ease ${Math.min(i*0.025,0.15)}s both`}}>
                        <td><Badge type={item.type}/></td>
                        <td><div style={{fontSize:13,color:"var(--t1)",fontWeight:500,lineHeight:1.3}}>{item.desc}</div>
                          {item.note&&<div style={{fontSize:11,color:"var(--t3)",marginTop:3}}>{item.note}</div>}
                          {item.entryFile&&<a href={item.entryFile.url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"var(--a3)",display:"inline-flex",alignItems:"center",gap:3,marginTop:4,textDecoration:"none",fontWeight:600}}>📎 View Bill</a>}
                        </td>

// ── APP SHELL ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{try{return JSON.parse(sessionStorage.getItem("cap_user")||"null");}catch{return null;}});
  function handleLogin(u){sessionStorage.setItem("cap_user",JSON.stringify(u));setUser(u);}
  function handleLogout(){sessionStorage.removeItem("cap_user");setUser(null);}
  if(!user)return <Login onLogin={handleLogin}/>;
  return <AppMain user={user} onLogout={handleLogout}/>;
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function AppMain({user,onLogout}){
  const ro=user.role==="readonly";
  const [contracts,setContracts]=useState(DEFAULTS);
  const [page,setPage]=useState("home");
  const [activeId,setActiveId]=useState(null);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [errors,setErrors]=useState({});
  const [aiText,setAiText]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [sync,setSync]=useState("loading");
  const [toast,setToast]=useState({msg:"",type:"success"});
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("All");
  const [auditLog,setAuditLog]=useState(()=>{try{return JSON.parse(localStorage.getItem("cap_audit_v1")||"[]");}catch{return [];}});

  const active=contracts.find(c=>c.id===activeId);

  function showToast(msg,type="success"){setToast({msg,type});setTimeout(()=>setToast({msg:"",type:"success"}),3000);}
  function addAudit(action,contractName,contractId,detail){
    const entry={id:uid(),ts:new Date().toISOString(),user:user.username,action,contractName,contractId,detail};
    setAuditLog(prev=>{
      const upd=[entry,...prev];
      localStorage.setItem("cap_audit_v1",JSON.stringify(upd));
      auditWrite(upd); // sync globally to Supabase
      return upd;
    });
  }

  // Load global audit log from Supabase on startup
  useEffect(()=>{
    auditRead().then(data=>{
      if(data&&data.length){
        setAuditLog(data);
        localStorage.setItem("cap_audit_v1",JSON.stringify(data));
      }
    }).catch(()=>{});
  },[]);

  useEffect(()=>{
    setSync("loading");
    cloudRead()
      .then(d=>{if(d)setContracts(mergeDefaults(d));setSync("ok");})
      .catch(()=>{
        setSync("error");
        try{const l=JSON.parse(localStorage.getItem("cap_v1")||"null");if(l)setContracts(mergeDefaults(l));}catch{}
        showToast("Using offline data","info");
      });
  },[]);

  function save(upd,msg,type="success"){
    setContracts(upd);localStorage.setItem("cap_v1",JSON.stringify(upd));
    setSync("saving");
    cloudWrite(upd)
      .then(()=>{setSync("ok");if(msg)showToast(msg,type);})
      .catch(()=>{setSync("error");showToast("Saved locally — cloud sync failed","info");});
  }

  function openC(id){setActiveId(id);setPage("detail");setAiText("");setSearch("");setFilter("All");}
  function openModal(m,data={}){setModal(m);setForm({...data});setErrors({});}
  function closeModal(){setModal(null);setForm({});setErrors({});}

  function validate(fields){
    const e={};
    fields.forEach(f=>{if(!form[f]||String(form[f]).trim()==="")e[f]=true;});
    setErrors(e);return Object.keys(e).length===0;
  }

  function saveContract(){
    if(!validate(["name"]))return;
    let upd;
    const existingContract=contracts.find(c=>c.id===form.id);
    if(form.id&&existingContract){
      upd=contracts.map(c=>c.id===form.id?{...c,...form,value:parseFloat(form.value)||0}:c);
      addAudit("Contract Updated",form.name,form.id,`Value: AED ${(parseFloat(form.value)||0).toLocaleString()}`);
    } else {
      const c={id:form.id||uid(),items:[],...form,value:parseFloat(form.value)||0};
      upd=[...contracts,c];setActiveId(c.id);setPage("detail");
      addAudit("Contract Created",form.name,c.id,`Value: AED ${(parseFloat(form.value)||0).toLocaleString()}`);
    }
    save(upd,existingContract?"Contract updated":"Contract created");closeModal();
  }

  // Handles both new entry (no form.id) and editing existing entry (form.id present)
  function saveItem(){
    if(!validate(["type","date","desc","amount"]))return;
    const itemData={
      type:form.type,
      desc:form.desc.trim(),
      amount:Math.abs(parseFloat(form.amount)),
      date:form.date,
      note:form.note?.trim()||"",
      ...(form.entryFile?{entryFile:form.entryFile}:{entryFile:null})
    };
    let upd;
    const existingItem=active?.items.find(i=>i.id===form.id);
    if(form.id&&existingItem){
      // Edit existing entry
      upd=contracts.map(c=>c.id===activeId
        ?{...c,items:c.items.map(i=>i.id===form.id?{...i,...itemData}:i)}
        :c);
      save(upd,"Entry updated");
      addAudit("Entry Updated",active?.name||"",activeId,`[${form.type}] ${form.desc.trim()}: AED ${Math.abs(parseFloat(form.amount)).toLocaleString()}`);
    } else {
      // New entry — use pre-generated ID if file was uploaded, otherwise generate new
      const item={id:form._preId||uid(),...itemData};
      upd=contracts.map(c=>c.id===activeId?{...c,items:[...c.items,item]}:c);
      save(upd,"Entry added");
      addAudit("Entry Added",active?.name||"",activeId,`[${form.type}] ${form.desc.trim()}: AED ${Math.abs(parseFloat(form.amount)).toLocaleString()}`);
    }
    closeModal();
  }

  function delItem(iid){
    const item=active?.items.find(i=>i.id===iid);
    save(contracts.map(c=>c.id===activeId?{...c,items:c.items.filter(i=>i.id!==iid)}:c),"Entry deleted");
    addAudit("Entry Deleted",active?.name||"",activeId,item?`[${item.type}] ${item.desc}: AED ${item.amount.toLocaleString()}`:"");
  }
  function delContract(id){
    const c=contracts.find(x=>x.id===id);
    save(contracts.filter(x=>x.id!==id),"Contract deleted");
    addAudit("Contract Deleted",c?.name||"Unknown",id,`${c?.items?.length||0} entries removed`);
    setPage("home");setActiveId(null);closeModal();
  }

  function exportB(){
    const b=new Blob([JSON.stringify(contracts,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="cap-backup-"+today()+".json";a.click();
    showToast("Backup exported");
  }
  function exportOnePDF(c){
    if(typeof window.jspdf==="undefined"){showToast("PDF library not loaded","error");return;}
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=doc.internal.pageSize.getWidth();
    const fmtN=n=>"AED "+Number(n||0).toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2});
    const fmtD=d=>{try{return new Date(d+"T00:00:00").toLocaleDateString("en-AE",{day:"numeric",month:"short",year:"numeric"});}catch{return d||"—";}};
    const cRev=c.items.filter(i=>isIncome(i.type)).reduce((s,i)=>s+i.amount,0);
    const cCost=c.items.filter(i=>!isIncome(i.type)).reduce((s,i)=>s+i.amount,0);
    const cNet=c.value+cRev-cCost;
    const cMargin=c.value>0?((cNet/c.value)*100).toFixed(1):"0";

    // Header bar
    doc.setFillColor(15,10,5);doc.rect(0,0,W,28,"F");
    doc.setFillColor(217,119,6);doc.rect(0,26,W,2,"F");
    doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(251,191,36);
    doc.text("CONTRACT ACCOUNTANT PRO",14,10);
    doc.setFontSize(16);doc.setTextColor(245,237,224);doc.text(c.name,14,20);
    doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor(138,114,96);
    let metaX=14;
    if(c.client){doc.text("Client: "+c.client,metaX,36);metaX+=doc.getTextWidth("Client: "+c.client)+8;}
    if(c.startDate){doc.text("Started: "+fmtD(c.startDate),metaX,36);metaX+=doc.getTextWidth("Started: "+fmtD(c.startDate))+8;}

    // Summary table
    doc.autoTable({startY:42,theme:"grid",
      head:[["Metric","Amount"]],
      body:[
        ["Contract Value",fmtN(c.value)],
        ["Revenue Received",fmtN(cRev)],
        ["Total Costs",fmtN(cCost)],
        ["Net Balance",(cNet>=0?"+":"")+fmtN(cNet)],
        ["Margin",cMargin+"%"],
      ],
      headStyles:{fillColor:[15,10,5],textColor:[251,191,36],fontStyle:"bold",fontSize:9},
      bodyStyles:{fontSize:9,textColor:[50,30,15]},
      alternateRowStyles:{fillColor:[245,237,224]},
      columnStyles:{0:{fontStyle:"bold",cellWidth:80},1:{halign:"right"}},
      margin:{left:14,right:14}
    });

    // Entries table
    const startY=doc.lastAutoTable.finalY+8;
    doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(138,114,96);
    doc.text("ENTRIES ("+c.items.length+")",14,startY);
    doc.autoTable({startY:startY+4,theme:"striped",
      head:[["Date","Type","Description","Amount","Note"]],
      body:c.items.slice().sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).map(i=>[
        fmtD(i.date),i.type,i.desc,
        (isIncome(i.type)?"+":"−")+fmtN(i.amount),
        i.note||"—"
      ]),
      headStyles:{fillColor:[15,10,5],textColor:[251,191,36],fontStyle:"bold",fontSize:8},
      bodyStyles:{fontSize:8,textColor:[50,30,15]},
      alternateRowStyles:{fillColor:[250,244,235]},
      columnStyles:{3:{halign:"right"},4:{textColor:[138,114,96]}},
      didParseCell:data=>{if(data.section==="body"&&data.column.index===3){const v=data.cell.raw||"";data.cell.styles.textColor=v.startsWith("+")?[22,163,74]:[220,38,38];}},
      margin:{left:14,right:14}
    });

    // Footer
    const fY=doc.internal.pageSize.getHeight()-12;
    doc.setDrawColor(200,180,150);doc.line(14,fY-4,W-14,fY-4);
    doc.setFont("helvetica","normal");doc.setFontSize(7);doc.setTextColor(138,114,96);
    doc.text("Contract Accountant PRO — Confidential",14,fY);
    doc.text("Generated: "+new Date().toLocaleDateString("en-AE",{day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"}),W-14,fY,{align:"right"});

    doc.save(c.name.replace(/\s+/g,"-")+"-report.pdf");
    showToast("PDF exported");
  }

        headStyles:{fillColor:[15,10,5],textColor:[251,191,36],fontStyle:"bold",fontSize:8},
        bodyStyles:{fontSize:8,textColor:[50,30,15]},
        alternateRowStyles:{fillColor:[250,244,235]},
        columnStyles:{3:{halign:"right"},4:{textColor:[138,114,96]}},
        didParseCell:data=>{if(data.section==="body"&&data.column.index===3){const v=data.cell.raw||"";data.cell.styles.textColor=v.startsWith("+")?[22,163,74]:[220,38,38];}},
        margin:{left:14,right:14}
      });
      // Footer
      const fY=doc.internal.pageSize.getHeight()-12;
      doc.setDrawColor(200,180,150);doc.line(14,fY-4,W-14,fY-4);
      doc.setFont("helvetica","normal");doc.setFontSize(7);doc.setTextColor(138,114,96);
      doc.text("Contract Accountant PRO — Confidential",14,fY);
      doc.text("Generated: "+new Date().toLocaleDateString("en-AE",{day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"}),W-14,fY,{align:"right"});
    });
    doc.save("all-contracts-report-"+today()+".pdf");
    showToast("All contracts exported as PDF");
  }
  function importOne(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed.name||!Array.isArray(parsed.items)){showToast("Invalid contract file","error");return;}
        const exists=contracts.find(c=>c.id===parsed.id);
        if(exists){
          if(confirm(`Contract "${exists.name}" already exists. Overwrite it?`))
            save(contracts.map(c=>c.id===parsed.id?parsed:c),"Contract imported");
        } else {
          save([...contracts,{...parsed,id:parsed.id||uid()}],"Contract imported");
        }
      }catch{showToast("Failed to read file","error");}
    };
    r.readAsText(f);e.target.value="";
  }
  function importB(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!Array.isArray(parsed)){showToast("Invalid backup file","error");return;}
        if(confirm("Restore this backup? This will replace all current data."))save(parsed,"Backup restored");
      }catch{showToast("Failed to read file","error");}
    };
    r.readAsText(f);e.target.value="";
  }

  async function genAI(){
    if(!active)return;setAiLoad(true);setAiText("");
    const aRev=active.items.filter(i=>isIncome(i.type)).reduce((s,i)=>s+i.amount,0);
    const aCosts=active.items.filter(i=>!isIncome(i.type)).reduce((s,i)=>s+i.amount,0);
    const aNet=active.value+aRev-aCosts;
    const breakdown=TYPES.filter(t=>!isIncome(t)).map(t=>{const sum=active.items.filter(i=>i.type===t).reduce((s,i)=>s+i.amount,0);return sum>0?`${t}: AED ${sum.toFixed(2)}`:""}).filter(Boolean).join(", ");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":"","anthropic-version":"2023-06-01"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:900,
          messages:[{role:"user",content:`You are a professional construction contract accountant. Provide a concise financial analysis in 3 short paragraphs labeled "Financial Health", "Key Risks", and "Recommendations". Be specific to the numbers.\n\nContract: ${active.name}\nClient: ${active.client||"N/A"}\nContract Value: AED ${active.value.toFixed(2)}\nRevenue Received: AED ${aRev.toFixed(2)}\nTotal Costs: AED ${aCosts.toFixed(2)}\nNet Balance: AED ${aNet.toFixed(2)}\nMargin: ${active.value>0?((aNet/active.value)*100).toFixed(1):"N/A"}%\nCost Breakdown: ${breakdown||"None"}\nRecent Entries: ${active.items.slice(-5).map(i=>`[${i.type}] ${i.desc}: AED ${i.amount}`).join(", ")||"None"}`}]})});
      if(!res.ok){const d=await res.json().catch(()=>({}));setAiText("AI unavailable: "+(d.error?.message||`HTTP ${res.status}`));}
      else{const d=await res.json();setAiText(d.content?.[0]?.text||"No response.");}
    }catch{setAiText("Unable to connect. Please check your API key configuration.");}
    setAiLoad(false);
  }

  // ── COMPUTED ──
  const rev=active?.items.filter(i=>isIncome(i.type)).reduce((s,i)=>s+i.amount,0)||0;
  const exp=active?.items.filter(i=>i.type==="Expense").reduce((s,i)=>s+i.amount,0)||0;
  const sal=active?.items.filter(i=>i.type==="Salary").reduce((s,i)=>s+i.amount,0)||0;
  const mat=active?.items.filter(i=>i.type==="Materials").reduce((s,i)=>s+i.amount,0)||0;
  const oth=active?.items.filter(i=>!isIncome(i.type)&&!["Expense","Salary","Materials"].includes(i.type)).reduce((s,i)=>s+i.amount,0)||0;
  const totalCost=exp+sal+mat+oth;
  const net=(active?.value||0)+rev-totalCost;
  const margin=active?.value>0?((net/active.value)*100).toFixed(1):"0";
  const totalPortfolio=contracts.reduce((s,c)=>s+c.value,0);
  const totalNet=contracts.reduce((acc,c)=>{
    const r=c.items.filter(i=>isIncome(i.type)).reduce((s,i)=>s+i.amount,0);
    const e=c.items.filter(i=>!isIncome(i.type)).reduce((s,i)=>s+i.amount,0);
    return acc+c.value+r-e;
  },0);

  const filteredItems=useMemo(()=>{
    if(!active)return[];
    return active.items.filter(item=>{
      const matchType=filter==="All"||item.type===filter;
      const matchSearch=!search||item.desc.toLowerCase().includes(search.toLowerCase())||item.note?.toLowerCase().includes(search.toLowerCase());
      return matchType&&matchSearch;
    }).slice().sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  },[active,filter,search]);

  const syncColor=sync==="error"?"#f87171":sync==="ok"?"#fbbf24":"#f59e0b";
  const syncLabel=sync==="loading"?"Syncing":sync==="saving"?"Saving":sync==="ok"?"Live":"Offline";

  const isItemModal=modal==="new-item"||modal==="edit-item";

  return <div style={{minHeight:"100vh"}}>
    <Toast msg={toast.msg} type={toast.type}/>

    {/* Modals — all top-level stable components */}
    {modal&&<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)closeModal();}}>
      {(modal==="new-contract"||modal==="edit-contract")&&
        <ContractModal modal={modal} form={form} setForm={setForm} errors={errors} onSave={saveContract} onClose={closeModal} ro={ro}/>}
      {isItemModal&&
        <ItemModal modal={modal} activeName={active?.name} form={form} setForm={setForm} errors={errors} onSave={saveItem} onClose={closeModal} ro={ro} activeContractId={activeId}/>}
      {modal==="delete-confirm"&&
        <DeleteModal name={active?.name} itemCount={active?.items?.length||0} onDelete={()=>delContract(active.id)} onClose={closeModal}/>}
    </div>}

    {/* Nav */}
    <nav className="nav">
      <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",flexShrink:0}} onClick={()=>{setPage("home");setActiveId(null);}}>
        <div style={{width:38,height:38,background:"linear-gradient(145deg,#92400e,var(--a2),var(--a))",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#1a0f00",boxShadow:"0 4px 18px rgba(245,158,11,0.45),inset 0 1px 0 rgba(255,255,255,0.2)",flexShrink:0,fontWeight:900}}>◈</div>
        <div className="hide-mob">
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:14,fontWeight:700,color:"var(--t1)",letterSpacing:"-0.01em",lineHeight:1.2,display:"flex",alignItems:"center",gap:6}}>
            Contract Accountant
            <span style={{fontSize:9,fontWeight:800,color:"var(--a3)",letterSpacing:"0.08em"}}>PRO</span>
          </div>
          <div style={{fontSize:10,color:"var(--t5)",letterSpacing:"0.03em"}}>Multi-Contract Financial Tracker</div>
        </div>
      </div>

      {/* Nav Tabs */}
      <div className="hide-mob" style={{display:"flex",gap:2,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:3}}>
        <button className={"nav-tab"+(page!=="dashboard"?" active":"")} onClick={()=>{setPage("home");setActiveId(null);}}>Contracts</button>
        <button className={"nav-tab"+(page==="dashboard"?" active":"")} onClick={()=>setPage("dashboard")}>Dashboard</button>
      </div>

      <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:syncColor,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:20,padding:"5px 10px",whiteSpace:"nowrap",transition:"color 0.3s"}}>
          <span className={"sync-dot"+(sync!=="ok"?" pulse":"")} style={{background:syncColor,transition:"background 0.3s"}}/>
          <span className="sync-label">{syncLabel}</span>
        </div>

        {page==="detail"&&active&&<>
          {!ro&&<button className="btn-g hide-mob" style={{fontSize:12,padding:"8px 16px"}} onClick={()=>openModal("edit-contract",{...active})}>✎ Edit</button>}
          {!ro&&<RippleBtn className="btn-p mob-hide-nav" style={{fontSize:12,padding:"9px 16px"}} onClick={()=>openModal("new-item",{date:today()})}>+ Entry</RippleBtn>}
          <button className="btn-g mob-hide-nav" style={{fontSize:12,padding:"8px 14px"}} onClick={()=>{setPage("home");setActiveId(null);}}>← Back</button>
        </>}
        {page==="home"&&!ro&&<RippleBtn className="btn-p hide-mob" style={{fontSize:12,padding:"9px 16px"}} onClick={()=>openModal("new-contract")}>+ New Contract</RippleBtn>}

        <div style={{width:1,height:20,background:"var(--border)"}} className="hide-mob"/>
        <div className="hide-mob" style={{display:"flex",alignItems:"center",gap:7}}>
          <div style={{width:26,height:26,background:"rgba(251,191,36,0.14)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"var(--a3)",fontWeight:800}}>
            {user.username[0].toUpperCase()}
          </div>
          <span style={{fontSize:12,color:"var(--t3)",fontWeight:500}}>{user.username}</span>
          {ro&&<span style={{fontSize:9,color:"#fbbf24",background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:8,padding:"2px 8px",fontWeight:800,letterSpacing:"0.05em"}}>VIEW ONLY</span>}
        </div>
        <button className="btn-sm" onClick={onLogout} title="Sign out" style={{padding:"7px 11px",fontSize:11}}>⏻<span className="hide-mob"> Out</span></button>
      </div>
    </nav>

    {/* Page */}
    <div className="wrap" style={{maxWidth:1000,margin:"0 auto",padding:"28px 24px"}}>
      {page==="home"&&<HomePage key="home"
        contracts={contracts} totalPortfolio={totalPortfolio} totalNet={totalNet}
        ro={ro} openC={openC} openModal={openModal}/>}
      {page==="detail"&&active&&<DetailPage key={activeId}
        active={active} rev={rev} exp={exp} sal={sal} mat={mat} oth={oth}
        totalCost={totalCost} net={net} margin={margin} ro={ro}
        filteredItems={filteredItems} search={search} setSearch={setSearch}
        filter={filter} setFilter={setFilter}
        onBack={()=>{setPage("home");setActiveId(null);}}
        openModal={openModal} delItem={delItem}
        exportOnePDF={exportOnePDF} aiText={aiText} aiLoad={aiLoad} genAI={genAI}/>}
      {page==="dashboard"&&<DashboardPage contracts={contracts} totalPortfolio={totalPortfolio} totalNet={totalNet} auditLog={auditLog} setAuditLog={setAuditLog} ro={ro} exportB={exportB} importB={importB} importOne={importOne} exportAllPDFs={exportAllPDFs}/>}
    </div>

    {/* Mobile bottom navigation — context-aware */}
    <nav className="mobile-nav">
      {page==="detail"&&active
        ?<>
          <button className="mobile-nav-btn active" onClick={()=>{setPage("home");setActiveId(null);}}>
            <span className="mn-icon">←</span>Back
          </button>
          {!ro&&<button className="mobile-nav-btn primary" onClick={()=>openModal("new-item",{date:today()})}>
            <span className="mn-icon">+</span>Add Entry
          </button>}
          {!ro&&<button className="mobile-nav-btn" onClick={()=>openModal("edit-contract",{...active})}>
            <span className="mn-icon">✎</span>Edit
          </button>}
        </>
        :<>
          <button className={"mobile-nav-btn"+(page==="home"?" active":"")} onClick={()=>{setPage("home");setActiveId(null);}}>
            <span className="mn-icon">◱</span>Contracts
          </button>
          {!ro&&<button className="mobile-nav-btn primary" onClick={()=>openModal("new-contract")}>
            <span className="mn-icon">+</span>New
          </button>}
          <button className={"mobile-nav-btn"+(page==="dashboard"?" active":"")} onClick={()=>setPage("dashboard")}>
            <span className="mn-icon">◫</span>Dashboard
          </button>
        </>
      }
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
